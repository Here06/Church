<div class="calendar-container">

  <div class="event-sidebar">
    <h3>Upcoming Events</h3>
    <ul>
      @for (event of events; track event) {
        <li
          (mouseover)="hoveredEvent = event"
          (mouseleave)="hoveredEvent = null">
          {{ event.title }}
          @if (hoveredEvent === event) {
            <div class="event-description">
              <p><strong>{{ event.title }}</strong></p>
              <p>{{ event.meta?.description }}</p>
              <p><em>{{ event.start | date: 'mediumDate' }}</em></p>
            </div>
          }
        </li>
      }
    </ul>
  </div>



  <div class="calendar-view">
    <div class="calendar-header">
      <h2>{{ viewDate | date: 'MMMM yyyy' }}</h2>
    </div>
    <div class="calendar-nav">
      <button (click)="goToPreviousMonth()">◀ Previous</button>
      <button (click)="goToToday()">Today</button>
      <button (click)="goToNextMonth()">Next ▶</button>
    </div>
    <mwl-calendar-month-view
      [viewDate]="viewDate"
      [events]="events">
    </mwl-calendar-month-view>
  </div>



</div>
