<div class="branch-grid">
  @for (branch of branchList; track branch) {
    <app-branch-card
      [title]="branch.title"
      [image]="branch.image"
      [address]="branch?.address"
      [city]="branch.city"
      [province]="branch.province"
      [pastor]="branch.pastor"
      [contact]="branch.contact"
      [service]="branch.service">
    </app-branch-card>
  }
</div>
