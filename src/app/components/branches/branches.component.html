<div class="branch-grid">
  @if (!(branchList$ | async)) {
    @for (skeleton of skeletons; track $index) {
      <app-branch-card [loading]="true"></app-branch-card>
    }
  } @else {
    @for (branch of branchList$ | async; track branch.id) {
      <app-branch-card
        [id]="branch.id"
        [image]="branch.image">
      </app-branch-card>
    }
  }
</div>
