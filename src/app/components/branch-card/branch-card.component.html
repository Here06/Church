<div class="branch-card" (click)="!loading && navigateToDetails()">
  <div class="card-content">
    @if (!loading) {
      <h4 class="title">{{ id }}</h4>
      <img [src]="image || 'assets/logo.png'" alt="Branch Image"/>
    } @else {
      <div class="skeleton-image"></div>
      <div class="skeleton-text"></div>
    }
  </div>
</div>
